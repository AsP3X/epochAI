name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: python -m pytest

      - name: Golden smoke (train + live-feed)
        run: |
          python -m epoch_ai train --bars 2500 --max-steps 2 --set walk_forward.initial_train_period=800 --set walk_forward.max_steps=2 --set execution.min_buffer_bars=500
          python -m epoch_ai run --live-feed --bars 2500 --live-bars 20 --set walk_forward.initial_train_period=800 --set execution.min_buffer_bars=800
