# =============================================================================
# epoch_ai - example configuration
# =============================================================================
# Focused on BTC/USDT perpetual futures, 15m candles, 4h (12-candle) horizon.
# Adding more pairs is as simple as extending the `symbols` list.

symbols:
  - "BTC/USDT"
timeframe: "15m"

# -----------------------------------------------------------------------------
# Data: maximise historical depth. BTC/USDT perp on Binance USDT-M starts ~2019-11.
# Set historical_start_date to "earliest" to auto-fetch from the exchange's very
# first available candle (true full history). For pre-2019 BTC history, switch
# exchange to "binance" + market_type "spot" (BTC/USDT spot lists from 2017-08).
# If the exchange is unreachable (e.g. geo-blocked), a realistic synthetic dataset
# is generated so the full pipeline runs offline.
# -----------------------------------------------------------------------------
data:
  exchange: "binanceusdm"
  market_type: "future"
  historical_start_date: "earliest"   # ISO date (e.g. "2019-11-01") or "earliest"
  data_dir: "artifacts/data"
  use_synthetic_fallback: false
  synthetic_seed: 7
  rate_limit_ms: 250
  context_symbols:
    - "ETH/USDT"              # joined as eth_close, eth_volume, etc. for cross-asset features
  fetch_fear_greed: true       # Crypto Fear & Greed index (Alternative.me)
  fetch_open_interest: true   # paginated OI history from the exchange
  fetch_spot_basis: true       # spot reference close for deriv_basis features
  spot_exchange: "binance"
  spot_symbol: null            # defaults to primary symbol (BTC/USDT spot)

# -----------------------------------------------------------------------------
# Feature groups (toggle on/off). Disabled groups are skipped entirely.
# -----------------------------------------------------------------------------
features:
  technical: true
  microstructure: true
  derivatives: true
  volatility: true
  time: true
  cross_asset: true            # ETH/BTC relative strength, ratio, correlation
  sentiment: true              # joins a `fear_greed` column when present
  onchain: false               # joins on-chain columns when present (requires external feed)
  dropna: true
  # Indicator look-back windows (config-driven; previously hard-coded in code).
  return_lags: [1, 3, 6, 12, 24, 48]
  ma_windows: [10, 20, 50, 100, 200]
  rsi_periods: [7, 14, 28]
  vol_windows: [12, 24, 48, 96]

# -----------------------------------------------------------------------------
# Prediction target: direction over a 12-candle (4h) horizon.
# -----------------------------------------------------------------------------
prediction:
  horizon: 12
  task: "classification"
  threshold: 0.0
  neutral_band: 0.0          # >0 drops |fwd return| within the band (train on decisive moves only)

# -----------------------------------------------------------------------------
# Gradient-boosting model. Backend is pluggable:
#   lightgbm (default) - fast CPU training; gpu = OpenCL.
#   xgboost  (optional)- `pip install xgboost`; device=cuda runs on NVIDIA GPUs.
# Both store open weights in the registry and share the same interface.
# -----------------------------------------------------------------------------
model:
  model_dir: "artifacts/models"
  backend: lightgbm           # lightgbm | xgboost (xgboost enables real CUDA-GPU training)
  num_boost_round: 300
  early_stopping_rounds: 30
  val_fraction: 0.15          # time-ordered tail for early stopping + calibration
  class_weight: balanced      # derive scale_pos_weight from label balance ("none" to disable)
  calibration: isotonic       # post-hoc probability calibration: isotonic | sigmoid | none
  refit_full_after_es: true   # after ES picks #rounds, refit on full window (keep freshest bars)
  device: cpu                 # cpu | gpu | cuda — LightGBM gpu=OpenCL, XGBoost gpu/cuda=CUDA; auto-falls back to cpu
  gpu_platform_id: -1         # OpenCL platform id for LightGBM device=gpu (-1 = auto)
  gpu_device_id: -1           # OpenCL/CUDA device ordinal (-1 = auto; pin a GPU on multi-GPU hosts)
  params:
    learning_rate: 0.03
    num_leaves: 63
    max_depth: -1
    min_data_in_leaf: 50
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    lambda_l1: 0.1            # mild L1 regularisation (was 0.0)
    lambda_l2: 1.0            # mild L2 regularisation (was 0.0)
    min_gain_to_split: 0.0
    verbosity: -1

# -----------------------------------------------------------------------------
# *** Progressive historical learning (the heart of the system) ***
# Train on the oldest data first, predict the next unseen period, ingest the real
# outcomes + context, retrain, and march forward through all of history.
# -----------------------------------------------------------------------------
walk_forward:
  initial_train_period: 2000   # candles used for the first fit (oldest data)
  step_size: 200               # candles predicted + ingested per iteration
  retrain_frequency: 1         # retrain every N steps (1 = every step)
  expanding: true              # expanding window = full accumulated history
  recency_half_life: 4000      # decay sample weights so recent regimes matter more
  embargo: null                # purge gap between train/test (null = prediction.horizon; 0 = off)
  max_steps: null              # cap iterations for quick demos (null = full run)

# -----------------------------------------------------------------------------
# Automated retraining gate: `auto-retrain` (and `schedule-retrain --promote`)
# train a challenger, score it and the current champion on a held-out tail, and
# only repoint the live model when the challenger improves the metric.
# -----------------------------------------------------------------------------
promotion:
  eval_bars: 2000              # most-recent resolved bars held out for the comparison
  metric: oos_logloss          # oos_logloss|oos_brier|oos_rmse (lower better) | oos_accuracy|oos_auc|oos_directional_accuracy (higher)
  min_improvement: 0.0         # required sign-aware improvement over champion (must be strictly positive; a tie never promotes)

# -----------------------------------------------------------------------------
# Risk & execution (kept completely separate from prediction).
# -----------------------------------------------------------------------------
risk:
  initial_capital: 10000.0
  risk_per_trade: 0.02
  max_leverage: 3.0
  long_threshold: 0.55
  short_threshold: 0.45
  fee_rate: 0.0004
  slippage: 0.0002
  allow_short: true
  min_confidence: 0.0
  max_drawdown_halt: null     # e.g. 0.15 to halt new entries after 15% drawdown
  max_daily_loss: null        # e.g. 0.05 to halt after 5% session loss
  cooldown_bars: 0            # flat bars after a losing period

# Live runtime: trained model + live data -> predictions -> trades
execution:
  mode: paper                 # paper | live
  live_enabled: false         # set true only with API keys and --confirm-live
  dry_run: true               # log orders but simulate fills when live_enabled
  api_key_env: EPOCH_AI_API_KEY
  api_secret_env: EPOCH_AI_API_SECRET
  reserve_fraction: 0.2       # 20% of session wins set aside; 80% reinvested
  cold_storage_fraction: 0.0  # additional fraction moved to cold storage
  max_daily_profit_take: null # e.g. 500 to cap daily profit withdrawal
  treasury_state_path: artifacts/treasury.json
  kill_switch_path: artifacts/kill_switch.json
  audit_log_path: artifacts/audit/trades.jsonl
  metrics_path: artifacts/metrics/runtime.jsonl
  audit_enabled: true
  metrics_enabled: true
  calibration_min_accuracy: null  # e.g. 0.52 to block trades when OOS accuracy drops
  calibration_min_samples: 30
  min_buffer_bars: 500

api:
  host: "127.0.0.1"
  port: 8000

telegram:
  enabled: false
  token_env: EPOCH_AI_TELEGRAM_TOKEN
  allowed_chat_ids: []

backtest:
  use_vectorbt: false          # set true if vectorbt is installed
  annualization_factor: null   # auto-derived from timeframe when null
  horizon_aware: true          # hold each signal for prediction.horizon bars (matches target)

logging:
  db_path: "artifacts/logs/predictions.sqlite"

tracking:
  enabled: false               # set true if mlflow is installed
  tracking_uri: "artifacts/mlruns"
  experiment_name: "epoch-ai"
