# =============================================================================
# epoch_ai - example configuration
# =============================================================================
# BTC/USDT perpetual futures, 5-minute candles, multi-horizon prediction
# (5m through 4h). Adding more pairs extends the `symbols` list.

symbols:
  - "BTC/USDT"
timeframe: "5m"

# -----------------------------------------------------------------------------
# Data: maximise historical depth. BTC/USDT perp on Binance USDT-M starts ~2019-11.
# Set historical_start_date to "earliest" to auto-fetch from the exchange's very
# first available candle (true full history). For pre-2019 BTC history, switch
# exchange to "binance" + market_type "spot" (BTC/USDT spot lists from 2017-08).
# If the exchange is unreachable, download fails unless use_synthetic_fallback is true
# (tests/demos only). Training always requires real exchange data + provenanced cache.
# -----------------------------------------------------------------------------
data:
  exchange: "binanceusdm"
  market_type: "future"
  historical_start_date: "earliest"   # ISO date (e.g. "2019-11-01") or "earliest"
  data_dir: "artifacts/data"
  use_synthetic_fallback: false       # never for production train; tests may override
  synthetic_seed: 7
  rate_limit_ms: 250
  context_symbols:
    - "ETH/USDT"              # joined as eth_* for cross-asset features
    - "SOL/USDT"              # joined as sol_* (high-beta L1 context for BTC)
    - "BNB/USDT"              # exchange token / beta basket
    - "DOGE/USDT"             # retail sentiment proxy
  fetch_fear_greed: true       # Crypto Fear & Greed index (Alternative.me)
  fetch_open_interest: true   # paginated OI history from the exchange
  fetch_spot_basis: true       # spot reference close for deriv_basis features
  synthesize_market_extensions: false  # OFF: proxies are noise/price-derived, not real feeds
  spot_exchange: "binance"
  spot_symbol: null            # defaults to primary symbol (BTC/USDT spot)

# -----------------------------------------------------------------------------
# Feature groups (toggle on/off). Disabled groups are skipped entirely.
# -----------------------------------------------------------------------------
features:
  technical: true
  microstructure: true
  derivatives: true
  volatility: true
  time: true
  cross_asset: true            # ETH/SOL/BNB/DOGE vs BTC relative strength, derivatives
  sentiment: true              # joins a `fear_greed` column when present
  onchain: true                # on-chain + token-safety columns (proxies offline)
  patterns: true               # classic chart-pattern geometry (secondary)
  manipulation: true           # rug/manipulation proxies from OHLCV+derivatives
  higher_timeframe: true       # 15m/1h/4h trend context aligned to 1m grid
  macro: true                  # dominance, stablecoin supply, DXY, VIX, etc.
  pattern_lookbacks: [24, 48, 96, 192, 384]
  pivot_confirm_bars: 3
  htf_timeframes: ["15m", "1h", "4h"]
  dropna: true
  return_lags: [1, 2, 3, 6, 12, 18, 24, 36, 48, 72, 96]
  ma_windows: [5, 10, 20, 50, 100, 200]
  rsi_periods: [7, 14, 21, 28]
  vol_windows: [6, 12, 24, 48, 96, 192]

# -----------------------------------------------------------------------------
# Multi-horizon prediction on a 5m base: direction + quantile return bands at
# 5m/15m/30m/1h/2h/4h. `horizon` is the primary head (1h = 12 x 5m candles);
# purge/embargo defaults to max(horizons)=48.
# -----------------------------------------------------------------------------
prediction:
  horizon: 12                  # primary head = 1h (12 x 5m candles)
  horizons: [1, 3, 6, 12, 24, 48]   # 5m, 15m, 30m, 1h, 2h, 4h
  quantiles: [0.1, 0.5, 0.9]
  task: "classification"
  threshold: 0.0
  neutral_band: 0.0005         # drop near-flat moves at 5m scale (moves are larger than 1m)

# -----------------------------------------------------------------------------
# Gradient-boosting model. Backend is pluggable:
#   lightgbm (default) - fast CPU training; gpu = OpenCL.
#   xgboost  (optional)- `pip install xgboost`; device=cuda runs on NVIDIA GPUs.
# Both store open weights in the registry and share the same interface.
# -----------------------------------------------------------------------------
model:
  model_dir: "artifacts/models"
  backend: tcn                  # tcn (temporal) | evolved_nn | lightgbm | xgboost
  evolution:
    enabled: true
    population_size: 12
    generations: 8
    elite_fraction: 0.25
    mutation_sigma: 0.2
    seed: 42
    fast_fit: true              # production: one deep net per retrain (no evolution loop)
    parallel_candidates: true     # train population concurrently (when fast_fit=false)
  # Parallel evolution workers (CUDA). Pin exactly with max_workers; otherwise auto tiers apply.
    max_workers: null             # null = auto from VRAM tiers below (clipped by cuda_worker_cap_max)
    cuda_auto_workers: true       # false => cuda_worker_cap_fallback (sequential-style cap)
    cuda_worker_cap_max: 12         # ceiling on auto workers (use 2 on 4–6 GB GPUs)
    cuda_worker_cap_fallback: 2     # when cuda_auto_workers=false
    cuda_worker_vram_gb: [8, 16, 24, 40]   # ascending GB thresholds
    cuda_worker_caps: [2, 4, 6, 8, 12]     # len = len(vram_gb)+1; caps[i+1] when VRAM >= tier[i]
    early_stop_patience: null     # stop after N generations w/o improvement (null = off)
  # Multi-fidelity search: short-train all candidates, full-train only the best.
  # Frees GPU time so a larger population/generations fits the same wall clock.
    successive_halving: false       # true = proxy rung + promote survivors
    sh_proxy_epoch_fraction: 0.3    # proxy rung uses 30% of nn.max_epochs
    sh_promote_fraction: 0.34       # fully train top ~third (clamped >= elite count)
  # Weak GPU example (4–6 GB, e.g. GTX 1650 / T4 with tight VRAM):
  #   max_workers: 2
  #   cuda_worker_cap_max: 2
  #   cuda_auto_batch: false  (under model.nn)
  #   batch_size: 128
  # High-end example (A6000 48 GB) — raise caps only if VRAM headroom is comfortable:
  #   cuda_worker_cap_max: 12
  #   cuda_batch_cap: 4096
  #   successive_halving: true   # then bump population_size/generations for better search
  # ---------------------------------------------------------------------------
  # evolved_nn MLP depth / width (only when backend: evolved_nn).
  # Evolution picks hidden layer count in [min_layers, max_layers] and each
  # layer width in [hidden_size_min, hidden_size_max]. Set fixed_hidden_sizes
  # to seed a specific shape; evolution still mutates around that architecture.
  #
  # Deep-network preset (uncomment values below; needs more VRAM, slower train):
  #   min_layers: 4
  #   max_layers: 6
  #   hidden_size_min: 64
  #   hidden_size_max: 1024
  #   fixed_hidden_sizes: [512, 384, 256, 128]
  #
  # CLI (no YAML edit):
  #   python -m epoch_ai train --bars 87000 --log-predictions --set model.device=cuda `
  #     --set model.nn.min_layers=4 --set model.nn.max_layers=6 `
  #     --set model.nn.hidden_size_max=1024 `
  #     --set model.nn.fixed_hidden_sizes=[512,384,256,128]
  # ---------------------------------------------------------------------------
  nn:
    min_layers: 4               # deep fixed architecture (with fast_fit + fixed_hidden_sizes)
    max_layers: 6
    hidden_size_min: 64
    hidden_size_max: 1024
    fixed_hidden_sizes: [512, 384, 256, 128, 64]
    max_epochs: 200
    batch_size: 256               # base batch; CUDA may scale up when cuda_auto_batch=true
    cuda_auto_batch: true         # scale batches toward cuda_batch_cap on GPU
    cuda_batch_cap: 4096          # upper bound on auto-batch; lower on constrained VRAM (e.g. 512)
    cuda_batches_per_epoch: 16    # target steps/epoch when auto-batch scales up
    val_check_interval: 1          # validate every N epochs (1 = every epoch)
    patience: 15
    compute_importance: true       # permutation importance on final walk-forward fit only
    mixed_precision: true          # torch.autocast on CUDA (disable on very old GPUs if unstable)
    torch_compile: false           # off by default: little gain with fast_fit; avoids dynamo noise
  # ---------------------------------------------------------------------------
  # Temporal Convolutional Network (only when backend: tcn). The TCN consumes a
  # sliding window of the last `lookback` engineered feature rows and learns
  # temporal structure directly (causal: bar t sees only rows <= t). Each block
  # uses dilation 2**i, so the receptive field grows exponentially with depth.
  # ---------------------------------------------------------------------------
  tcn:
    lookback: 96                 # past bars per input window (96 x 5m = 8h)
    channels: [64, 64, 128, 128]  # output channels per dilated residual block
    kernel_size: 3
    dropout: 0.1
    max_epochs: 120
    batch_size: 256              # raise on GPUs with spare VRAM for throughput
    patience: 12                 # early-stopping patience on val loss
    learning_rate: 0.001
    weight_decay: 0.00001
    compute_importance: true     # permutation importance on the final walk-forward fit only
    mixed_precision: true        # torch.autocast on CUDA
    # Trunk capacity scaling: the shared TCN trunk is where extra hidden layers draw
    # connections across many bars, so more blocks + longer lookback = more temporal
    # structure learned. The shipped defaults above are CPU-safe; scale up on real GPUs.
    # GPU preset (powerful CUDA card) — deeper/wider trunk + longer context:
    #   channels: [128, 128, 256, 256, 512]  # 5 dilated residual blocks (deeper trunk)
    #   lookback: 192                         # longer context window (192 x 5m = 16h)
    #   batch_size: 1024                      # larger batches saturate the GPU
    #   mixed_precision: true                 # keep autocast on for GPU throughput
    # Weak GPU / CPU downshift — shallower/narrower trunk + shorter context:
    #   channels: [32, 32]
    #   lookback: 64
    #   batch_size: 256
  # CUDA runtime (evolved_nn / tcn on GPU only; ignored on CPU)
  cuda:
    allow_tf32: true               # Ampere+ matmul speedup
    cudnn_benchmark: true
    matmul_precision: high         # high/medium = tensor-core fp32 matmul; highest = strict fp32
  num_boost_round: 300
  early_stopping_rounds: 30
  val_fraction: 0.15          # time-ordered tail for early stopping + calibration
  class_weight: balanced      # derive scale_pos_weight from label balance ("none" to disable)
  calibration: isotonic       # post-hoc probability calibration: isotonic | sigmoid | none
  refit_full_after_es: true   # after ES picks #rounds, refit on full window (keep freshest bars)
  device: auto                # auto | cpu | gpu | cuda — auto picks CUDA when available
  gpu_platform_id: -1         # OpenCL platform id for LightGBM device=gpu (-1 = auto)
  gpu_device_id: -1           # OpenCL/CUDA device ordinal (-1 = auto; pin a GPU on multi-GPU hosts)
  retain_versions: 10         # auto-delete older v_* dirs during train (null = keep all)
  register_each_retrain: true   # false = single registry write at end (faster on slow/network disks)
  defer_registry_prune: false    # true = defer pruning until walk-forward completes
  params:
    learning_rate: 0.03
    num_leaves: 63
    max_depth: -1
    min_data_in_leaf: 50
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    lambda_l1: 0.2            # stronger L1 as feature count grows
    lambda_l2: 2.0            # stronger L2 as feature count grows
    min_gain_to_split: 0.0
    verbosity: -1

# -----------------------------------------------------------------------------
# *** Progressive historical learning (the heart of the system) ***
# Train on the oldest data first, predict the next unseen period, ingest the real
# outcomes + context, retrain, and march forward through all of history.
# -----------------------------------------------------------------------------
walk_forward:
  initial_train_period: 8640   # ~30 days of 5m bars before first OOS prediction
  step_size: 288               # ~1 day per walk-forward step (288 x 5m)
  retrain_frequency: 5         # tcn/evolved_nn: 5 balances cost; use 1 to retrain every step
  expanding: true              # expanding window = full accumulated history
  recency_half_life: 15000     # decay sample weights so recent regimes matter more
  embargo: null                # purge gap (null = prediction.max_horizon=48; 0 = off)
  max_steps: null              # cap iterations for quick demos (null = full run)
  checkpoint_enabled: true     # save progress each step; `train --resume` continues
  checkpoint_path: null        # null = artifacts/checkpoints/walk_forward_<symbol>.json

# -----------------------------------------------------------------------------
# Automated retraining gate: `auto-retrain` (and `schedule-retrain --promote`)
# train a challenger, score it and the current champion on a held-out tail, and
# only repoint the live model when the challenger improves the metric.
# -----------------------------------------------------------------------------
promotion:
  eval_bars: 6048              # ~21 days of 5m bars held out for challenger vs champion
  metric: oos_brier_weighted  # conf-weighted per-horizon Brier (multi-head); oos_logloss|oos_brier|...
  min_improvement: 0.0         # required sign-aware improvement over champion (must be strictly positive; a tie never promotes)

# Post-initial coarse auto-retrain + action-log feedback (schedule-retrain --promote).
adaptation:
  enabled: true
  coarse_step_size: 864        # ~3 days at 5m (larger than initial walk_forward.step_size)
  coarse_retrain_frequency: 1
  schedule_interval_hours: 24  # daily default for schedule-retrain
  holdout_bars: null           # null => promotion.eval_bars (never train on this tail)
  use_action_log_for_retrain: true
  action_log_min_rows: 50
  action_log_weight_boost: 2.0

# -----------------------------------------------------------------------------
# Pre-trade safety gate (execution only; direction model unchanged).
# -----------------------------------------------------------------------------
safety:
  enabled: false
  max_suspicion_score: 0.75
  scale_weight_by_suspicion: true
  block_on_missing_onchain: false

# -----------------------------------------------------------------------------
# Risk & execution (kept completely separate from prediction).
# -----------------------------------------------------------------------------
risk:
  initial_capital: 10000.0
  risk_per_trade: 0.02
  max_leverage: 1.0             # 1x default (no borrowing); configurable upward
  long_threshold: 0.58        # P(up) long entry (wider band reduces churn vs 0.55)
  short_threshold: 0.42      # P(up) short entry (paired with long_threshold)
  fee_rate: 0.0004
  slippage: 0.0002
  allow_short: true
  min_confidence: 0.0
  max_drawdown_halt: null     # e.g. 0.15 to halt new entries after 15% drawdown
  max_daily_loss: null        # e.g. 0.05 to halt after 5% session loss
  cooldown_bars: 0            # flat bars after a losing period

# Learned / baseline trading policy (execution only; predictor stays separate).
trading:
  policy_backend: learned_with_baseline_fallback     # threshold|baseline|learned|learned_with_baseline_fallback
  reliability_floor: 0.35
  max_position_fraction: 1.0
  max_drawdown_kill: 0.20
  max_hold_bars: 288           # ~1 day at 5m
  funding_rate_per_bar: 0.0
  trade_frequency: selective    # selective|active
  # Multi-timescale policy input: a FAST head (1 bar) + slower MULTI-bar heads,
  # all drawn from prediction.horizons ([1, 3, 6, 12, 24, 48]). Leaving this empty
  # falls back to ALL prediction.horizons (also multi-timescale, just wider).
  decision_horizons: [1, 6, 12]  # fast (5m) + 30m + 1h heads at a 5m base

  action_log_path: artifacts/logs/action_log.jsonl
  session_state_path: artifacts/session_state.json

rl:
  enabled: false
  policy_path: artifacts/policy/ppo_policy.pt
  # Policy net capacity (one Linear layer per width). Larger default for a more
  # serious model; safe on CPU for tests. GPU preset can go wider, e.g.
  # [512, 512, 256]; weak GPUs / CPU-only should downshift to [128, 64].
  hidden_sizes: [256, 128]
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.2
  train_epochs: 4
  rollout_steps: 256
  total_updates: 50
  drawdown_penalty: 0.5
  sharpe_scale: 1.0
  reward_mode: multi_bar        # per_bar (noisy single-bar PnL) or multi_bar (lower-noise, accumulates over reward_horizon)
  reward_horizon: 12            # bars over which a decision's PnL is accumulated (multi_bar mode)
  turnover_penalty: 0.0         # penalty per unit of absolute position-weight change (discourages churn)
  observation_mode: forecast    # forecast: per-horizon forecast summary obs. embedding: shared TCN trunk embedding (A.5 shared-trunk policy)
  trunk_frozen: true             # Stage 1: freeze TCN trunk during policy train; set false + policy_loss_weight>0 for joint fine-tune
  policy_loss_weight: 0.0        # >0 with trunk_frozen=false enables joint trunk fine-tuning (Stage 2)
  prediction_aux_weight: 1.0     # scale supervised multi-head loss during joint trunk steps
  supervised_aux_steps: 1        # supervised mini-batch steps per PPO update (joint mode)
  device: auto
  promotion:
    enabled: true
    eval_bars: null            # null => promotion.eval_bars
    metric: risk_adjusted_return
    min_improvement: 0.0
    champion_path: artifacts/policy/champion.pt
    require_beat_baseline: false   # report-only: baseline comparison logged, not gated
    require_beat_buy_hold: false   # report-only: buy-and-hold comparison logged, not gated
    min_absolute_metric: 0.0       # absolute floor on the gate metric (blocks money-losing promotes, incl. bootstrap)
    max_prediction_brier_regression: 0.02  # joint trunk: max allowed holdout Brier increase vs champion

# Live runtime: trained model + live data -> predictions -> trades
execution:
  mode: paper                 # paper | live
  live_enabled: false         # set true only with API keys and --confirm-live
  dry_run: true               # log orders but simulate fills when live_enabled
  api_key_env: EPOCH_AI_API_KEY
  api_secret_env: EPOCH_AI_API_SECRET
  reserve_fraction: 0.2       # 20% of session wins set aside; 80% reinvested
  cold_storage_fraction: 0.0  # additional fraction moved to cold storage
  max_daily_profit_take: null # e.g. 500 to cap daily profit withdrawal
  treasury_state_path: artifacts/treasury.json
  kill_switch_path: artifacts/kill_switch.json
  audit_log_path: artifacts/audit/trades.jsonl
  metrics_path: artifacts/metrics/runtime.jsonl
  audit_enabled: true
  metrics_enabled: true
  calibration_min_accuracy: null  # e.g. 0.52 to block trades when OOS accuracy drops
  calibration_min_samples: 30
  min_buffer_bars: 1500         # ~5 days of 5m warmup for live/replay (>= lookback + max_horizon + feature warmup)

api:
  host: "127.0.0.1"
  port: 8000

telegram:
  enabled: false
  token_env: EPOCH_AI_TELEGRAM_TOKEN
  allowed_chat_ids: []

backtest:
  use_vectorbt: false          # set true if vectorbt is installed
  annualization_factor: null   # auto-derived from timeframe when null
  horizon_aware: true          # hold each signal for prediction.horizon bars (matches target)

logging:
  db_path: "artifacts/logs/predictions.sqlite"

tracking:
  enabled: false               # set true if mlflow is installed
  tracking_uri: "artifacts/mlruns"
  experiment_name: "epoch-ai"
